# SajiloKirana — local development stack.
# Run from repo root: docker compose up -d
# Starts Postgres + Redis only (the apps/backend run on the host during dev).
# See Section 6: separate containers for backend & ml_service in prod.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sajilo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sajilo
      POSTGRES_PASSWORD: sajilo
      POSTGRES_DB: sajilokirana
    ports:
      - "5432:5432"
    volumes:
      - sajilo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sajilo -d sajilokirana"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sajilo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sajilo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sajilo_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      DATABASE_URL: "postgresql://sajilo:sajilo@postgres:5432/sajilokirana?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "dev-insecure-secret-change-me"
      OTP_USE_FIXED: "true"
      OTP_FIXED_CODE: "123456"
      ML_SERVICE_URL: "http://ml_service:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: sajilo_ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      OSRM_BASE_URL: "http://router.project-osrm.org"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sajilo_pgdata:
  sajilo_redisdata:
