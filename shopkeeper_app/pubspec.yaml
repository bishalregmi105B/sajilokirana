name: shopkeeper_app
description: SajiloKirana Shopkeeper App — manage orders, inventory, and payouts.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  provider: ^6.0.5
  dio: ^5.3.0
  flutter_secure_storage: ^9.2.4
  socket_io_client: ^2.0.3+1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
